<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bling ERP · Pedidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & tokens ──────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0b0e14;
    --surface:  #111620;
    --card:     #161c2a;
    --border:   #1f2940;
    --accent:   #2f7fff;
    --accent2:  #00d4aa;
    --danger:   #ff4f6a;
    --warn:     #ffb340;
    --text:     #e2e8f5;
    --muted:    #5a6b8a;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Syne', sans-serif;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid noise texture ──────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(47,127,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(47,127,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ──────────────────────────────────────────────────────────── */
  #app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Header ──────────────────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem;
    height: 64px;
    border-bottom: 1px solid var(--border);
    background: rgba(11,14,20,.85);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    display: flex; align-items: center; gap: .75rem;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: #fff;
  }
  .logo-text { font-size: 1.1rem; font-weight: 800; letter-spacing: -.02em; }
  .logo-text span { color: var(--accent); }

  .header-right { display: flex; align-items: center; gap: 1rem; }

  .last-update {
    font-family: var(--mono);
    font-size: .7rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: .3rem .75rem;
    border-radius: 6px;
  }

  .btn {
    font-family: var(--sans);
    font-size: .8rem; font-weight: 700;
    padding: .45rem 1.1rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all .15s ease;
    letter-spacing: .03em;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #4a90ff; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary.loading { opacity: .7; pointer-events: none; }

  /* ── Main ────────────────────────────────────────────────────────────── */
  main { flex: 1; padding: 2rem; max-width: 1440px; margin: 0 auto; width: 100%; }

  /* ── Stats bar ───────────────────────────────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .stat-card:hover { border-color: var(--accent); }

  .stat-label {
    font-size: .7rem; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: .5rem;
  }
  .stat-value {
    font-size: 1.8rem; font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-value.money { color: var(--accent2); -webkit-text-fill-color: var(--accent2); background: none; }

  /* ── Filters ─────────────────────────────────────────────────────────── */
  .toolbar {
    display: flex; align-items: center; gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .search-wrap {
    flex: 1; min-width: 240px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: .75rem; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .85rem;
    padding: .55rem .75rem .55rem 2.25rem;
    outline: none;
    transition: border-color .2s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }

  .filter-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: .8rem;
    padding: .55rem 1rem;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  .filter-select:focus { border-color: var(--accent); }

  /* ── Table ───────────────────────────────────────────────────────────── */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 1rem 1.25rem;
    text-align: left;
    font-size: .7rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(47,127,255,.05); }

  td {
    padding: .9rem 1.25rem;
    font-size: .85rem;
    vertical-align: middle;
  }

  .td-number { font-family: var(--mono); font-weight: 500; color: var(--accent); }
  .td-name { font-weight: 600; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-date { font-family: var(--mono); font-size: .78rem; color: var(--muted); }
  .td-value { font-family: var(--mono); font-weight: 600; color: var(--accent2); }

  /* ── Badge ───────────────────────────────────────────────────────────── */
  .badge {
    display: inline-flex; align-items: center; gap: .35rem;
    padding: .25rem .65rem;
    border-radius: 6px;
    font-size: .72rem; font-weight: 700; letter-spacing: .04em;
    white-space: nowrap;
  }
  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .badge-green  { background: rgba(0,212,170,.12); color: #00d4aa; }
  .badge-blue   { background: rgba(47,127,255,.15); color: #6aa3ff; }
  .badge-yellow { background: rgba(255,179,64,.12); color: #ffb340; }
  .badge-red    { background: rgba(255,79,106,.12); color: #ff4f6a; }
  .badge-gray   { background: rgba(90,107,138,.15); color: #8a9bbf; }

  /* ── Pagination ──────────────────────────────────────────────────────── */
  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
    font-size: .8rem;
  }
  .pag-info { color: var(--muted); font-family: var(--mono); }
  .pag-controls { display: flex; gap: .5rem; }
  .pag-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: .78rem; font-weight: 600;
    padding: .35rem .8rem;
    cursor: pointer;
    transition: all .15s;
  }
  .pag-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .pag-btn:disabled { opacity: .35; cursor: not-allowed; }
  .pag-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Empty / loading ─────────────────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: .5; }
  .empty-title { font-size: 1rem; font-weight: 700; margin-bottom: .4rem; }
  .empty-sub { font-size: .8rem; }

  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Modal ───────────────────────────────────────────────────────────── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 90%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 2rem;
    animation: fadeUp .2s ease;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 1.2rem; font-weight: 800; }
  .modal-close {
    background: none; border: none;
    color: var(--muted); font-size: 1.4rem;
    cursor: pointer; line-height: 1;
    transition: color .15s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-section { margin-bottom: 1.5rem; }
  .modal-section-title {
    font-size: .7rem; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: .75rem;
  }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .modal-field { background: var(--surface); border-radius: 8px; padding: .75rem 1rem; }
  .modal-field-label { font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .25rem; }
  .modal-field-value { font-size: .88rem; font-weight: 600; }

  .items-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .items-table th { text-align: left; color: var(--muted); font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; padding: .4rem .5rem; border-bottom: 1px solid var(--border); }
  .items-table td { padding: .6rem .5rem; border-bottom: 1px solid rgba(31,41,64,.5); }
  .items-table tr:last-child td { border-bottom: none; }

  /* ── Notification toast ──────────────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: .85rem 1.25rem;
    font-size: .85rem; font-weight: 600;
    color: var(--accent);
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Responsive ──────────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    main { padding: 1rem; }
    header { padding: 0 1rem; }
    .logo-text { display: none; }
    .last-update { display: none; }
    .hide-mobile { display: none; }
    .modal-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">B</div>
      <div class="logo-text"><span>Bling</span> ERP · Pedidos</div>
    </div>
    <div class="header-right">
      <div class="last-update" id="lastUpdate">— aguardando dados —</div>
      <button class="btn btn-primary" id="btnRefresh" onclick="refresh()">
        ⟳ Atualizar
      </button>
    </div>
  </header>

  <!-- Main -->
  <main>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-label">Total de Pedidos</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Valor Total</div>
        <div class="stat-value money" id="statValor">—</div>
      </div>
      <div class="stat-card" id="statSit1">
        <div class="stat-label" id="statSit1L">—</div>
        <div class="stat-value" id="statSit1V">—</div>
      </div>
      <div class="stat-card" id="statSit2">
        <div class="stat-label" id="statSit2L">—</div>
        <div class="stat-value" id="statSit2V">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          class="search-input"
          id="searchInput"
          placeholder="Buscar por número ou cliente..."
          oninput="onSearch()"
        />
      </div>
      <select class="filter-select" id="filterSituacao" onchange="onFilter()">
        <option value="todos">Todas situações</option>
      </select>
      <select class="filter-select" id="filterLimite" onchange="onLimiteChange()">
        <option value="20">20 por página</option>
        <option value="50">50 por página</option>
        <option value="100">100 por página</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table id="pedidosTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Cliente</th>
            <th class="hide-mobile">Data</th>
            <th class="hide-mobile">Previsão</th>
            <th>Situação</th>
            <th>Valor</th>
            <th class="hide-mobile">Canal</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7"><div class="empty-state"><div class="spinner"></div></div></td></tr>
        </tbody>
      </table>

      <!-- Pagination -->
      <div class="pagination" id="pagination" style="display:none">
        <div class="pag-info" id="pagInfo"></div>
        <div class="pag-controls" id="pagControls"></div>
      </div>
    </div>

  </main>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Carregando...</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
const API = '';  // mesmo origin
let state = {
  pedidos: [],
  total: 0,
  pagina: 1,
  limite: 20,
  situacao: 'todos',
  busca: '',
  loading: false,
};

let searchTimer = null;

// ── Init ────────────────────────────────────────────────────────────────────
async function init() {
  await loadStats();
  await loadPedidos();
  // Dispara busca inicial no Bling
  triggerRefresh();
}

// ── Data fetching ────────────────────────────────────────────────────────────
async function loadPedidos() {
  if (state.loading) return;
  state.loading = true;

  const params = new URLSearchParams({
    pagina: state.pagina,
    limite: state.limite,
  });
  if (state.situacao !== 'todos') params.set('situacao', state.situacao);
  if (state.busca) params.set('busca', state.busca);

  try {
    const res = await fetch(`${API}/api/pedidos?${params}`);
    const data = await res.json();
    state.pedidos = data.data || [];
    state.total = data.total || 0;

    if (data.ultima_atualizacao) {
      document.getElementById('lastUpdate').textContent =
        'Atualizado: ' + fmtDateTime(data.ultima_atualizacao);
    }

    renderTable();
    renderPagination();
    populateSituacaoFilter();
  } catch (e) {
    console.error('[loadPedidos] Erro:', e);
    renderError();
  }
  state.loading = false;
}

async function loadStats() {
  try {
    const res = await fetch(`${API}/api/stats`);
    const d = await res.json();
    document.getElementById('statTotal').textContent = d.total_pedidos || 0;
    document.getElementById('statValor').textContent =
      d.valor_total ? fmtMoney(d.valor_total) : 'R$ 0,00';

    const sits = Object.entries(d.por_situacao || {})
      .sort((a, b) => b[1] - a[1]);

    if (sits[0]) {
      document.getElementById('statSit1L').textContent = sits[0][0];
      document.getElementById('statSit1V').textContent = sits[0][1];
    }
    if (sits[1]) {
      document.getElementById('statSit2L').textContent = sits[1][0];
      document.getElementById('statSit2V').textContent = sits[1][1];
    }
  } catch (e) { /* silently ignore */ }
}

async function triggerRefresh() {
  try {
    await fetch(`${API}/api/pedidos/atualizar`, { method: 'POST' });
    // Aguarda 3s e recarrega
    setTimeout(async () => {
      await loadPedidos();
      await loadStats();
    }, 3000);
  } catch (e) {}
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tableBody');

  if (!state.pedidos.length) {
    tbody.innerHTML = `
      <tr><td colspan="7">
        <div class="empty-state">
          <div class="empty-icon">📦</div>
          <div class="empty-title">Nenhum pedido encontrado</div>
          <div class="empty-sub">Tente ajustar os filtros ou atualize os dados</div>
        </div>
      </td></tr>`;
    return;
  }

  tbody.innerHTML = state.pedidos.map(p => {
    const num   = p.numero || p.id || '—';
    const nome  = p.contato?.nome || '—';
    const data  = fmtDate(p.data);
    const prev  = fmtDate(p.dataPrevisao || p.dataPrevista);
    const valor = fmtMoney(p.totalProdutos || p.total || 0);
    const canal = p.loja?.descricao || p.canal?.descricao || '—';
    const badge = situacaoBadge(p.situacao);

    return `<tr onclick="openModal(${p.id})">
      <td><span class="td-number">#${num}</span></td>
      <td><span class="td-name" title="${nome}">${nome}</span></td>
      <td class="td-date hide-mobile">${data}</td>
      <td class="td-date hide-mobile">${prev}</td>
      <td>${badge}</td>
      <td class="td-value">${valor}</td>
      <td class="hide-mobile" style="font-size:.78rem;color:var(--muted)">${canal}</td>
    </tr>`;
  }).join('');
}

function renderPagination() {
  const total = state.total;
  const pagAtual = state.pagina;
  const totalPags = Math.max(1, Math.ceil(total / state.limite));

  document.getElementById('pagInfo').textContent =
    `${(pagAtual - 1) * state.limite + 1}–${Math.min(pagAtual * state.limite, total)} de ${total} pedidos`;

  const controls = document.getElementById('pagControls');
  let html = `<button class="pag-btn" onclick="goPage(${pagAtual - 1})" ${pagAtual <= 1 ? 'disabled' : ''}>‹ Anterior</button>`;

  const start = Math.max(1, pagAtual - 2);
  const end   = Math.min(totalPags, pagAtual + 2);
  for (let i = start; i <= end; i++) {
    html += `<button class="pag-btn ${i === pagAtual ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }

  html += `<button class="pag-btn" onclick="goPage(${pagAtual + 1})" ${pagAtual >= totalPags ? 'disabled' : ''}>Próxima ›</button>`;
  controls.innerHTML = html;

  document.getElementById('pagination').style.display = 'flex';
}

function renderError() {
  document.getElementById('tableBody').innerHTML = `
    <tr><td colspan="7">
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Erro ao carregar pedidos</div>
        <div class="empty-sub">Verifique se o servidor está rodando</div>
      </div>
    </td></tr>`;
}

function populateSituacaoFilter() {
  const sel = document.getElementById('filterSituacao');
  if (sel.options.length > 1) return; // já populado

  // Coleta ids únicos presentes nos pedidos carregados
  const idsPresentes = [...new Set(
    state.pedidos.map(p => p.situacao?.id).filter(v => v != null)
  )];

  idsPresentes.forEach(id => {
    const opt = document.createElement('option');
    opt.value = String(id);
    opt.textContent = SITUACAO_MAP[id]?.nome ?? `Situação ${id}`;
    sel.appendChild(opt);
  });
}

// ── Modal ────────────────────────────────────────────────────────────────────
async function openModal(id) {
  document.getElementById('modal').classList.add('open');
  document.getElementById('modalTitle').textContent = 'Carregando pedido...';
  document.getElementById('modalBody').innerHTML = '<div style="text-align:center;padding:2rem"><div class="spinner"></div></div>';

  try {
    const res = await fetch(`${API}/api/pedidos/${id}`);
    const json = await res.json();
    const p = json.data || json;
    renderModal(p);
  } catch (e) {
    document.getElementById('modalBody').innerHTML = '<p style="color:var(--danger)">Erro ao carregar detalhes.</p>';
  }
}

function renderModal(p) {
  document.getElementById('modalTitle').textContent = `Pedido #${p.numero || p.id}`;

  const itens = (p.itens || []).map(i => `
    <tr>
      <td>${i.descricao || i.produto?.descricao || '—'}</td>
      <td style="text-align:right;font-family:var(--mono)">${i.quantidade ?? 1}</td>
      <td style="text-align:right;font-family:var(--mono);color:var(--accent2)">${fmtMoney(i.valorUnidade || i.valor || 0)}</td>
      <td style="text-align:right;font-family:var(--mono);color:var(--accent2)">${fmtMoney((i.quantidade || 1) * (i.valorUnidade || i.valor || 0))}</td>
    </tr>`).join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Informações Gerais</div>
      <div class="modal-grid">
        <div class="modal-field"><div class="modal-field-label">Status</div><div class="modal-field-value">${situacaoBadge(p.situacao)}</div></div>
        <div class="modal-field"><div class="modal-field-label">Data do Pedido</div><div class="modal-field-value">${fmtDate(p.data)}</div></div>
        <div class="modal-field"><div class="modal-field-label">Previsão de Entrega</div><div class="modal-field-value">${fmtDate(p.dataPrevisao || p.dataPrevista || '')}</div></div>
        <div class="modal-field"><div class="modal-field-label">Canal / Loja</div><div class="modal-field-value">${p.loja?.descricao || p.canal?.descricao || '—'}</div></div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Cliente</div>
      <div class="modal-grid">
        <div class="modal-field"><div class="modal-field-label">Nome</div><div class="modal-field-value">${p.contato?.nome || '—'}</div></div>
        <div class="modal-field"><div class="modal-field-label">CPF / CNPJ</div><div class="modal-field-value">${p.contato?.cpfCnpj || '—'}</div></div>
        <div class="modal-field"><div class="modal-field-label">E-mail</div><div class="modal-field-value">${p.contato?.email || '—'}</div></div>
        <div class="modal-field"><div class="modal-field-label">Telefone</div><div class="modal-field-value">${p.contato?.celular || p.contato?.fone || '—'}</div></div>
      </div>
    </div>

    ${p.enderecoEntrega ? `
    <div class="modal-section">
      <div class="modal-section-title">Endereço de Entrega</div>
      <div class="modal-grid">
        <div class="modal-field"><div class="modal-field-label">Logradouro</div><div class="modal-field-value">${p.enderecoEntrega.endereco || '—'}, ${p.enderecoEntrega.numero || 'S/N'}</div></div>
        <div class="modal-field"><div class="modal-field-label">Bairro</div><div class="modal-field-value">${p.enderecoEntrega.bairro || '—'}</div></div>
        <div class="modal-field"><div class="modal-field-label">Cidade / UF</div><div class="modal-field-value">${p.enderecoEntrega.municipio || '—'} / ${p.enderecoEntrega.uf || '—'}</div></div>
        <div class="modal-field"><div class="modal-field-label">CEP</div><div class="modal-field-value">${p.enderecoEntrega.cep || '—'}</div></div>
      </div>
    </div>` : ''}

    ${itens ? `
    <div class="modal-section">
      <div class="modal-section-title">Itens do Pedido</div>
      <table class="items-table">
        <thead><tr><th>Produto</th><th style="text-align:right">Qtd</th><th style="text-align:right">Unit.</th><th style="text-align:right">Total</th></tr></thead>
        <tbody>${itens}</tbody>
      </table>
    </div>` : ''}

    <div class="modal-section">
      <div class="modal-section-title">Valores</div>
      <div class="modal-grid">
        <div class="modal-field"><div class="modal-field-label">Total Produtos</div><div class="modal-field-value" style="color:var(--accent2)">${fmtMoney(p.totalProdutos || 0)}</div></div>
        <div class="modal-field"><div class="modal-field-label">Frete</div><div class="modal-field-value">${fmtMoney(p.totalFrete || 0)}</div></div>
        <div class="modal-field"><div class="modal-field-label">Desconto</div><div class="modal-field-value" style="color:var(--danger)">${fmtMoney(p.desconto?.valor || 0)}</div></div>
        <div class="modal-field"><div class="modal-field-label">Total Geral</div><div class="modal-field-value" style="color:var(--accent2);font-size:1.1rem">${fmtMoney(p.total || p.totalProdutos || 0)}</div></div>
      </div>
    </div>

    ${p.observacoes ? `<div class="modal-section"><div class="modal-section-title">Observações</div><div style="background:var(--surface);border-radius:8px;padding:.75rem 1rem;font-size:.85rem;color:var(--muted)">${p.observacoes}</div></div>` : ''}
  `;
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
}

// ── Events ───────────────────────────────────────────────────────────────────
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.busca = document.getElementById('searchInput').value.trim();
    state.pagina = 1;
    loadPedidos();
  }, 350);
}

function onFilter() {
  state.situacao = document.getElementById('filterSituacao').value;
  state.pagina = 1;
  loadPedidos();
}

function onLimiteChange() {
  state.limite = parseInt(document.getElementById('filterLimite').value);
  state.pagina = 1;
  loadPedidos();
}

function goPage(p) {
  const totalPags = Math.ceil(state.total / state.limite);
  if (p < 1 || p > totalPags) return;
  state.pagina = p;
  loadPedidos();
}

async function refresh() {
  const btn = document.getElementById('btnRefresh');
  btn.classList.add('loading');
  btn.textContent = '⟳ Atualizando...';
  await triggerRefresh();
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.textContent = '⟳ Atualizar';
    showToast('Dados atualizados!');
  }, 3500);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtDate(str) {
    if (!str || str === '0000-00-00' || str === '0000-00-00 00:00:00') return '—';
    try {
        // Normaliza: remove hora se existir, força parse correto
        const clean = str.split(' ')[0]; // pega só "2026-03-23"
        const [y, m, d] = clean.split('-');
        if (!y || !m || !d) return '—';
        return `${d}/${m}/${y}`;
    } catch { return str; }
}

function fmtDateTime(str) {
  if (!str) return '—';
  try {
    const d = new Date(str);
    return d.toLocaleString('pt-BR');
  } catch { return str; }
}

function fmtMoney(v) {
  return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

// Mapa de IDs de situação do Bling → nome legível
const SITUACAO_MAP = {
  0:  { nome: 'Sem situação',   cls: 'badge-gray'   },
  1:  { nome: 'Em aberto',      cls: 'badge-yellow'  },
  2:  { nome: 'Atendido',       cls: 'badge-green'   },
  3:  { nome: 'Cancelado',      cls: 'badge-red'     },
  4:  { nome: 'Em andamento',   cls: 'badge-blue'    },
  5:  { nome: 'Vencido',        cls: 'badge-red'     },
  6:  { nome: 'Em aberto',      cls: 'badge-yellow'  },
  9:  { nome: 'Inativo',        cls: 'badge-gray'    },
  15: { nome: 'Em digitação',   cls: 'badge-gray'    },
};

function situacaoBadge(sit) {
  if (!sit) return '<span class="badge badge-gray">Desconhecida</span>';

  // Se vier com nome (endpoint de detalhe), usa o nome
  if (sit.nome) {
    const n = sit.nome.toLowerCase();
    let cls = 'badge-gray';
    if (n.includes('aberto') || n.includes('pendente')) cls = 'badge-yellow';
    else if (n.includes('atend') || n.includes('confirm') || n.includes('pago')) cls = 'badge-blue';
    else if (n.includes('entregue') || n.includes('conclu') || n.includes('finaliz')) cls = 'badge-green';
    else if (n.includes('cancel') || n.includes('devol')) cls = 'badge-red';
    return `<span class="badge ${cls}">${sit.nome}</span>`;
  }

  // Se vier só com id (endpoint de listagem), mapeia pelo id
  if (sit.id != null) {
    const mapped = SITUACAO_MAP[sit.id];
    if (mapped) return `<span class="badge ${mapped.cls}">${mapped.nome}</span>`;
    return `<span class="badge badge-gray">Situação ${sit.id}</span>`;
  }

  return '<span class="badge badge-gray">Desconhecida</span>';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Run ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
